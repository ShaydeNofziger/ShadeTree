<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="ShadeTree — a skydiver's living logbook, rendered as a growing tree, with a Wind Oracle whispering fortunes from altitude."
    />
    <title>ShadeTree — your jumps, growing</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">✦</span>
          <h1>ShadeTree</h1>
          <span class="tagline">your jumps, growing</span>
        </div>
        <nav class="tabs" role="tablist">
          <button role="tab" data-tab="tree" class="tab active">Canopy</button>
          <button role="tab" data-tab="logbook" class="tab">Logbook</button>
          <button role="tab" data-tab="oracle" class="tab">Wind Oracle</button>
        </nav>
      </header>

      <main>
        <section id="panel-tree" class="panel active" role="tabpanel">
          <div class="tree-stage">
            <svg id="tree" viewBox="0 0 900 700" preserveAspectRatio="xMidYMax meet" aria-label="Your jump history, as a tree"></svg>
            <aside id="leaf-tooltip" class="leaf-tooltip" hidden></aside>
          </div>
          <div class="tree-legend">
            <div class="stat"><span id="stat-jumps">0</span><small>jumps</small></div>
            <div class="stat"><span id="stat-years">0</span><small>seasons</small></div>
            <div class="stat"><span id="stat-disciplines">0</span><small>disciplines</small></div>
            <div class="stat"><span id="stat-altitude">0</span><small>miles in freefall</small></div>
          </div>
        </section>

        <section id="panel-logbook" class="panel" role="tabpanel">
          <div class="logbook-grid">
            <form id="jump-form" class="jump-form" autocomplete="off">
              <h2>Log a jump</h2>
              <label>
                <span>Date</span>
                <input type="date" name="date" required />
              </label>
              <label>
                <span>Discipline</span>
                <select name="discipline" required>
                  <option value="belly">Belly (RW)</option>
                  <option value="freefly">Freefly</option>
                  <option value="swoop">Swoop</option>
                  <option value="wingsuit">Wingsuit</option>
                  <option value="tracking">Tracking</option>
                  <option value="hop-pop">Hop &amp; Pop</option>
                  <option value="student">Student</option>
                  <option value="coach">Coach jump</option>
                  <option value="aff">AFF Instructor</option>
                  <option value="tandem">Tandem</option>
                </select>
              </label>
              <label>
                <span>Exit altitude (ft)</span>
                <input type="number" name="exitAltitude" min="2000" max="30000" step="100" value="13500" required />
              </label>
              <label>
                <span>Deployment (ft)</span>
                <input type="number" name="deploymentAltitude" min="1800" max="14000" step="100" value="4500" required />
              </label>
              <label>
                <span>Dropzone</span>
                <input type="text" name="dropzone" placeholder="Skydive Carolina" required />
              </label>
              <label class="wide">
                <span>Notes</span>
                <textarea name="notes" rows="2" placeholder="what did the sky say today?"></textarea>
              </label>
              <div class="form-actions">
                <button type="submit" class="primary">Plant leaf</button>
                <button type="button" id="reset-seed" class="ghost">Reset to sample tree</button>
              </div>
            </form>

            <div class="jump-list-wrap">
              <div class="list-header">
                <h2>Jumps</h2>
                <input
                  type="search"
                  id="jump-search"
                  placeholder="filter jumps…"
                  aria-label="Filter jumps"
                />
              </div>
              <ol id="jump-list" class="jump-list"></ol>
            </div>
          </div>
        </section>

        <section id="panel-oracle" class="panel" role="tabpanel">
          <div class="oracle">
            <div class="oracle-card" id="oracle-card">
              <div class="oracle-header">
                <h2>The Wind Oracle</h2>
                <p class="oracle-sub">a fortune drawn from altitude, season, and your history</p>
              </div>
              <div class="oracle-dial" aria-hidden="true">
                <div class="dial" id="oracle-dial"></div>
                <div class="dial-center"><span id="oracle-heading">—</span></div>
              </div>
              <blockquote id="oracle-quote" class="oracle-quote">
                Tap the compass to listen.
              </blockquote>
              <div class="oracle-forecast" id="oracle-forecast"></div>
              <div class="oracle-actions">
                <button id="oracle-roll" class="primary">Consult the winds</button>
                <button id="oracle-copy" class="ghost">Copy mantra</button>
              </div>
            </div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <span>ShadeTree · a cozy skydive companion</span>
        <span class="footer-dot">·</span>
        <span>data stays on your device</span>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
